<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Radios de Pancho Romero</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.player {
    width: 320px;
    padding: 20px;
    border-radius: 24px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    text-align: center;
}

.cover {
    width: 100%;
    height: 260px;
    border-radius: 16px;
    background: #222;
    background-size: cover;
    background-position: center;
    margin-bottom: 15px;
    transition: 0.5s;
}

.live {
    font-size: 12px;
    color: #ff3b3b;
    margin-bottom: 8px;
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% {opacity: 0.4;}
    50% {opacity: 1;}
    100% {opacity: 0.4;}
}

.title {
    font-size: 16px;
    font-weight: bold;
}

.artist {
    font-size: 13px;
    opacity: 0.6;
    margin-bottom: 10px;
}

.controls button {
    width: 50px;
    height: 50px;
    margin: 5px;
    border-radius: 50%;
    border: none;
    font-size: 18px;
    color: white;
    background: #ff3b3b;
    cursor: pointer;
    transition: 0.3s;
}

.controls button:hover {
    transform: scale(1.1);
}

input[type=range] {
    width: 100%;
}

select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    background: rgba(0,0,0,0.4);
    color: white;
    border: none;
    margin-top: 10px;
}

audio { display: none; }
</style>
</head>

<body>

<div class="player">

    <div class="cover" id="cover"></div>

    <div class="live">● EN VIVO</div>

    <div class="title" id="title">Cargando...</div>
    <div class="artist" id="artist">...</div>

    <div class="controls">
        <button onclick="play()">▶</button>
        <button onclick="pause()">⏸</button>
    </div>

    <input type="range" min="0" max="1" step="0.01" onchange="setVolume(this.value)">

    <select onchange="changeStation(this.value)">
        <option value="/pop">POP</option>
        <option value="/indie">INDIE</option>
        <option value="/chill">CHILL</option>
        <option value="/dance">DANCE</option>
        <option value="/uno">UNO</option>
        <option value="/cl">CL</option>
        <option value="/rock">ROCK</option>
        <option value="/kpop">KPOP</option>
        <option value="/fmsombras">FMSOMBRAS</option>
    </select>

    <audio id="audio" autoplay>
        <source src="https://radios.panchoromero.cl/pop">
    </audio>

</div>

<script>
const audio = document.getElementById("audio");
const titleEl = document.getElementById("title");
const artistEl = document.getElementById("artist");
const coverEl = document.getElementById("cover");

let currentStation = "/pop";

/* COLORES POR RADIO */
const colors = {
    "/pop": "#ff3b3b",
    "/indie": "#8e44ad",
    "/chill": "#00bcd4",
    "/dance": "#f39c12",
    "/uno": "#2ecc71",
    "/cl": "#e74c3c",
    "/rock": "#c0392b",
    "/kpop": "#ff69b4",
    "/fmsombras": "#9b59b6"
};

/* PLAYBACK */
function play(){ audio.play(); }
function pause(){ audio.pause(); }
function setVolume(v){ audio.volume = v; }

/* CAMBIO RADIO */
function changeStation(station){
    currentStation = station;
    audio.src = "https://radios.panchoromero.cl" + station;
    audio.play();
    updateMetadata();
    applyColor();
}

/* COLOR DINÁMICO */
function applyColor(){
    const c = colors[currentStation] || "#ff3b3b";
    document.querySelectorAll("button").forEach(b => b.style.background = c);
}

/* MANEJO ROBUSTO ICECAST */
function getSource(data){
    if (!data || !data.icestats) return null;

    const src = data.icestats.source;

    if (Array.isArray(src)) {
        return src.find(s =>
            s.listenurl && s.listenurl.includes(currentStation)
        );
    }

    return src;
}

/* METADATA */
async function updateMetadata(){
    try {
        const res = await fetch("https://radios.panchoromero.cl/status-json.xsl");
        const data = await res.json();

        const source = getSource(data);
        const song = source?.title || "";

        if (!song) {
            titleEl.textContent = "En vivo";
            artistEl.textContent = currentStation.replace("/", "").toUpperCase();
            return;
        }

        /* SPLIT INTELIGENTE */
        const parts = song.split(" - ");
        const artist = parts.length > 1 ? parts[0] : "En vivo";
        const title = parts.length > 1 ? parts[1] : song;

        titleEl.textContent = title;
        artistEl.textContent = artist;

        /* COVER DESDE ITUNES */
        const res2 = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(song)}&limit=1`);
        const data2 = await res2.json();

        let cover = "";
        if (data2.results.length > 0){
            cover = data2.results[0].artworkUrl100.replace("100x100","500x500");
            coverEl.style.backgroundImage = `url(${cover})`;
        }

        /* LOCKSCREEN */
        if ('mediaSession' in navigator){
            navigator.mediaSession.metadata = new MediaMetadata({
                title: title,
                artist: artist,
                artwork: cover ? [{ src: cover, sizes: "512x512", type: "image/png" }] : []
            });

            navigator.mediaSession.setActionHandler('play', play);
            navigator.mediaSession.setActionHandler('pause', pause);
        }

    } catch(e){
        console.log("Metadata error:", e);

        /* FALLBACK */
        titleEl.textContent = "En vivo";
        artistEl.textContent = currentStation.replace("/", "").toUpperCase();
    }
}

/* AUTO REFRESH */
setInterval(updateMetadata, 30000);

/* INIT */
applyColor();
updateMetadata();
</script>

</body>
</html>
